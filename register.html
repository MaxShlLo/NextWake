<!DOCTYPE html>
<html lang="uk" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NextWake - Реєстрація</title>
    <link rel="icon" type="image/png" href="Alarm.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="index.html">NextWake</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Будильник</a></li>
                    <li class="nav-item"><a class="nav-link" href="profile.html">Профіль</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">Про додаток</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Вхід</a></li>
                    <li class="nav-item"><a class="nav-link active" href="register.html">Реєстрація</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1 d-flex justify-content-center align-items-center">
        
        <div class="border p-4 rounded w-100" style="max-width: 500px;">
            <h2 class="mb-4 text-center">Створення акаунта</h2>
            
            <form>
                <div class="mb-3">
                    <label for="regName" class="form-label">Ім'я</label>
                    <input type="text" class="form-control" id="regName" placeholder="Введіть ваше ім'я">
                </div>

                <div class="mb-3">
                    <label for="regEmail" class="form-label">Електронна пошта</label>
                    <input type="email" class="form-control" id="regEmail" placeholder="name@example.com">
                </div>

                <div class="mb-3">
                    <label class="form-label d-block">Стать</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="genderOptions" id="genderMale" value="male">
                        <label class="form-check-label" for="genderMale">Чоловіча</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="genderOptions" id="genderFemale" value="female">
                        <label class="form-check-label" for="genderFemale">Жіноча</label>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="regDob" class="form-label">Дата народження</label>
                    <input type="date" class="form-control" id="regDob">
                </div>

                <button type="button" class="btn btn-success w-100">Зареєструватися</button>
                
                <div class="text-center mt-3">
                    <small>Вже є акаунт? <a href="login.html" class="text-success text-decoration-none">Увійти</a></small>
                </div>
            </form>
        </div>

    </main>

    <footer class="bg-dark text-white text-center py-3 mt-auto border-top border-secondary">
        <div class="container">
            <p class="mb-0">&copy; 2026 NextWake. Просинайся вчасно.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
