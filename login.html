<!DOCTYPE html>
<html lang="uk" data-bs-theme="dark">

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NextWake - Вхід</title>
    <link rel="icon" type="image/png" href="Alarm.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="index.html">NextWake</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Будильник</a></li>

    <main class="container my-5 flex-grow-1 d-flex justify-content-center align-items-center">
        <div class="border p-4 rounded w-100" style="max-width: 400px;">
            <h2 class="mb-4 text-center">Вхід до системи</h2>
            <form>
                <div class="mb-3">
                    <label for="loginEmail" class="form-label">Електронна пошта</label>
                    <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com">
                </div>
                <div class="mb-4">
                    <label for="loginPassword" class="form-label">Пароль</label>
                    <input type="password" class="form-control" id="loginPassword" placeholder="Введіть пароль">
                </div>
                <button type="button" class="btn btn-success w-100">Увійти</button>
                <div class="text-center mt-3">
                    <small>Немає акаунта? <a href="register.html" class="text-success text-decoration-none">Зареєструватися</a></small>

            </form>

    <footer class="bg-dark text-white text-center py-3 mt-auto border-top border-secondary">
        <div class="container">
            <p class="mb-0">&copy; 2026 NextWake. Просинайся вчасно.</p>
